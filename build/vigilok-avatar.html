<!doctype html>
<meta charset="utf-8" />
<title>VigilOK avatar — download PNG</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; gap: 20px;
         background: #0a0f1e; color: #cbd5e1; font: 15px/1.5 system-ui, sans-serif; }
  #wrap { display: grid; place-items: center; gap: 18px; padding: 32px; }
  svg { width: 280px; height: 280px; box-shadow: 0 12px 40px #0006; }
  button { background: #f59e0b; color: #241300; border: 0; border-radius: 10px;
           padding: 12px 22px; font-weight: 700; font-size: 15px; cursor: pointer; }
  button:hover { background: #fbbf24; }
  small { opacity: .7; max-width: 320px; text-align: center; }
</style>
<div id="wrap">
  <!-- 1:1 VigilOK mark: a health-factor gauge (red->amber->green arc + needle)
       inside a watchtower/shield outline. Hard 90deg corners on the exported
       canvas (no rx on the background rect) — OKX requires square, unrounded. -->
  <svg id="logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1e3a5f"/>
        <stop offset="1" stop-color="#0a0f1e"/>
      </linearGradient>
      <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#ef4444"/>
        <stop offset="0.5" stop-color="#f59e0b"/>
        <stop offset="1" stop-color="#22c55e"/>
      </linearGradient>
    </defs>
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- watchtower shield outline -->
    <path d="M256 60 L392 108 V252 C392 342 332 402 256 442 C180 402 120 342 120 252 V108 Z"
          fill="none" stroke="#93c5fd" stroke-width="12" stroke-linejoin="round" opacity="0.55"/>
    <!-- gauge arc -->
    <path d="M176 300 A104 104 0 0 1 336 300" fill="none" stroke="url(#arc)" stroke-width="26" stroke-linecap="round"/>
    <!-- needle, pointing safely into the green -->
    <g transform="rotate(35 256 300)">
      <line x1="256" y1="300" x2="256" y2="206" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
    </g>
    <circle cx="256" cy="300" r="16" fill="#e2e8f0"/>
    <circle cx="256" cy="300" r="6" fill="#0a0f1e"/>
  </svg>
  <button onclick="dl()">Download PNG (512x512)</button>
  <small>Click to save <b>vigilok.png</b> — upload that as the ASP avatar on OKX.AI.</small>
</div>
<script>
  function dl() {
    const svg = document.getElementById('logo');
    const xml = new XMLSerializer().serializeToString(svg);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 512, 512);
      c.toBlob((b) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'vigilok.png';
        a.click();
      }, 'image/png');
    };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
  }
</script>
