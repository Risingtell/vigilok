# Render blueprint — deploys VigilOK as a persistent web service (needed for
# the facilitator background retry to keep running between requests). Connect
# this repo in Render -> it reads this file. Set the secret env vars in the
# dashboard (never commit them).
services:
  - type: web
    name: vigilok
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      # web3.okx.com is reachable from Render's network — leave OKX_BASE_URL
      # unset in production (the code falls back to direct).
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET_KEY
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: PAY_TO
        sync: false
      - key: MPP_MERCHANT_PRIVATE_KEY
        sync: false
      - key: MPP_SECRET_KEY
        sync: false
      - key: BUYER_PRIVATE_KEY
        sync: false
      - key: XLAYER_RPC
        value: https://rpc.xlayer.tech
